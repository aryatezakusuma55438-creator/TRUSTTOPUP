<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Reset Password – TrustTop Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='simple.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='modern.css') }}">
  <style>
    body{background:#0a0a14;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
    .auth-card{background:#13131f;border:1px solid #2a2a3d;border-radius:16px;padding:40px 32px;width:100%;max-width:400px;}
    .auth-title{color:#fff;font-size:1.4rem;font-weight:800;margin-bottom:6px;}
    .auth-sub{color:#9ca3af;font-size:0.9rem;margin-bottom:24px;}
    .form-group{margin-bottom:18px;}
    label{display:block;color:#9ca3af;font-size:0.85rem;margin-bottom:6px;}
    input[type=password]{width:100%;padding:10px 14px;background:#0a0a14;border:1px solid #2a2a3d;border-radius:8px;color:#fff;font-size:0.95rem;box-sizing:border-box;}
    input[type=password]:focus{outline:none;border-color:#7c3aed;}
    .btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
    .auth-back{display:block;text-align:center;margin-top:16px;color:#9ca3af;font-size:0.85rem;text-decoration:none;}
    .auth-back:hover{color:#a855f7;}
    .flash{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:0.88rem;}
    .flash.success{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:#4ade80;}
    .flash.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;}
    .hint{color:#6b7280;font-size:0.78rem;margin-top:4px;}
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-title">Reset Password</div>
    <div class="auth-sub">Choose a new password for your account.</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('reset_password', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" required minlength="8" maxlength="128" autocomplete="new-password">
        <div class="hint">At least 8 characters, must include a letter and a number.</div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required minlength="8" maxlength="128" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary">Reset Password</button>
    </form>
    <a href="{{ url_for('login') }}" class="auth-back">← Back to Login</a>
  </div>
<script src="{{ url_for('static', filename='theme-switcher.js') }}"></script>
</body>
</html>
