<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TrustTop Up</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='simple.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='modern.css') }}">
<style>
  .auth-page { min-height: 100vh; background: var(--bg); padding: 70px 24px 40px; box-sizing: border-box; }
  .auth-close-btn {
    position: fixed; top: 20px; left: 20px;
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    color: #fff; text-decoration: none; font-size: 1.1rem; line-height: 1;
  }
  .auth-wrap { max-width: 400px; margin: 0 auto; }
  .auth-logo { display:flex; align-items:flex-end; justify-content:center; line-height:1; margin-bottom: 10px; }
  .auth-logo .logo-t { font-family:'Orbitron',monospace; font-weight:900; background:linear-gradient(90deg, var(--purple-glow), var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .auth-logo .logo-t1 { font-size: 2.1rem; }
  .auth-logo .logo-t2 { font-size: 1.3rem; margin-left: -3px; }
  .auth-title { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; color:#fff; text-align:center; margin-bottom: 6px; }
  .auth-sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; text-align:center; margin-bottom: 28px; }
  .auth-field { margin-bottom: 16px; }
  .auth-field label { display:block; font-size:0.82rem; color:rgba(255,255,255,0.6); margin-bottom:6px; }
  .auth-field input {
    width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(var(--purple-rgb),0.25);
    border-radius:10px; padding:12px 14px; color:#fff; font-family:'Nunito',sans-serif; font-size:0.92rem;
    outline:none; box-sizing:border-box;
  }
  .auth-field input:focus { border-color: var(--purple-glow); }
  .auth-row-between { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; font-size:0.8rem; }
  .auth-remember { display:flex; align-items:center; gap:7px; color:rgba(255,255,255,0.55); }
  .auth-remember input { accent-color: var(--purple-glow); }
  .auth-forgot { color: var(--purple-glow); text-decoration:none; font-weight:600; }
  .auth-submit {
    width:100%; padding:13px; border-radius:10px; border:none;
    background:linear-gradient(90deg,#7c3aed,#06b6d4); color:#fff;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; margin-bottom: 20px;
  }
  .auth-divider { display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.3); font-size:0.75rem; margin: 18px 0; }
  .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }
  .google-btn {
    display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:13px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:10px;
    color:#fff; font-family:'Nunito',sans-serif; font-size:0.92rem; font-weight:600; text-decoration:none;
  }
  .google-btn:hover { background: rgba(255,255,255,0.1); }
  .auth-switch { text-align:center; margin-top: 22px; font-size:0.85rem; color:rgba(255,255,255,0.45); }
  .auth-switch a { color: var(--purple-glow); font-weight:700; text-decoration:none; }
  .auth-flash { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 14px; margin-bottom:16px; color:#f87171; font-size:0.85rem; text-align:left; }
</style>
</head>
<body>
<div class="auth-page">
  <a href="{{ url_for('index') }}" class="auth-close-btn" aria-label="Close">&#10005;</a>
  <div class="auth-wrap">
    <div class="auth-logo"><span class="logo-t logo-t1">T</span><span class="logo-t logo-t2">T</span></div>
    <div class="auth-title">{{ t('nav_login') }}</div>
    <div class="auth-sub">{{ t('hero_title') }}</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="auth-flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="auth-field">
        <label for="login-identifier">Username / Email</label>
        <input type="text" id="login-identifier" name="identifier" required autocomplete="username">
      </div>
      <div class="auth-field">
        <label for="login-password">{{ t('label_password') }}</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password">
      </div>
      <div class="auth-row-between">
        <label class="auth-remember"><input type="checkbox" name="remember"> Ingat akun ku</label>
        <a href="{{ url_for('forgot_password') }}" class="auth-forgot">Lupa kata sandi?</a>
      </div>
      <button type="submit" class="auth-submit">{{ t('nav_login') }}</button>
    </form>

    <div class="auth-divider">ATAU</div>

    <a href="{{ url_for('login_google') }}" class="google-btn">
      <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="Google">
      Continue with Google
    </a>

    <div class="auth-switch">
      Belum punya akun? <a href="{{ url_for('register') }}">{{ t('nav_register') }}</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='theme-switcher.js') }}"></script>
</body>
</html>
